<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            width: 1200px;
            height: 630px;
            background: #0a0a0a;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 80px 96px;
            -webkit-font-smoothing: antialiased;
        }

        .eyebrow {
            font-family: -apple-system, sans-serif;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #C4932A;
            margin-bottom: 24px;
        }

        .wordmark {
            font-family: 'Fraunces', Georgia, serif;
            font-size: 120px;
            font-weight: 700;
            line-height: 1;
            letter-spacing: -3px;
            color: #e8e6df;
            font-optical-sizing: auto;
            margin-bottom: 32px;
        }

        .tagline {
            font-family: -apple-system, sans-serif;
            font-size: 26px;
            font-weight: 400;
            color: rgba(232,230,223,0.45);
            letter-spacing: 0;
            line-height: 1.4;
        }

        .rule {
            position: absolute;
            bottom: 80px;
            left: 96px;
            right: 96px;
            height: 1px;
            background: rgba(232,230,223,0.08);
        }

        .laws-label {
            position: absolute;
            bottom: 50px;
            left: 96px;
            font-family: -apple-system, sans-serif;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(232,230,223,0.2);
        }
    </style>
</head>
<body>
    <p class="eyebrow">usehelm.com</p>
    <h1 class="wordmark">Helm</h1>
    <p class="tagline">You steer. Agents execute.</p>
    <div class="rule"></div>
    <p class="laws-label">10 laws for the agentic era</p>
</body>
</html>
